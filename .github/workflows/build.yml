name: Build and validate site

on:
  workflow_call:
    inputs:
      base_url:
        type: string
        default: /ebola-resources

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jupyter-book pyyaml

      - name: Validate myst.yml syntax
        run: python -c "import yaml; yaml.safe_load(open('myst.yml'))"

      - name: Check TOC file references exist
        run: |
          python -c "
          import yaml, sys, os
          with open('myst.yml') as f:
              config = yaml.safe_load(f)
          missing = []
          def walk_toc(items):
              for item in items:
                  if 'file' in item:
                      path = item['file']
                      if not os.path.exists(path):
                          missing.append(path)
                  if 'children' in item:
                      walk_toc(item['children'])
          walk_toc(config['project']['toc'])
          if missing:
              print('Missing files referenced in myst.yml:')
              for m in missing:
                  print(f'  - {m}')
              sys.exit(1)
          print('All TOC file references exist.')
          "

      - name: Build site
        env:
          BASE_URL: ${{ inputs.base_url }}
        run: jupyter-book build --html

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: _build/html
