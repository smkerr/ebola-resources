name: Create resource page from issue

on:
  issues:
    types: [opened, labeled]

jobs:
  create-resource:
    if: contains(github.event.issue.labels.*.name, 'new-resource')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate resource page and update myst.yml
        id: generate
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          FILE_PATH=$(python .github/scripts/parse-issue.py \
            --issue-body "$ISSUE_BODY" \
            --output-dir docs/resources \
            --myst-yml myst.yml)
          echo "file_path=$FILE_PATH" >> "$GITHUB_OUTPUT"

      - name: Create branch and commit
        env:
          FILE_PATH: ${{ steps.generate.outputs.file_path }}
          BRANCH: resource/issue-${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add "$FILE_PATH" myst.yml
          git commit -m "Add resource from issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.RESOURCE_BOT_TOKEN }}
          BRANCH: resource/issue-${{ github.event.issue.number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          TITLE="Add resource from issue #${ISSUE_NUMBER}"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$(cat <<EOF
          Auto-generated from #${ISSUE_NUMBER}.

          ## Review checklist

          - [ ] Resource file is in the correct section directory
          - [ ] \`myst.yml\` entry is in the correct position (reorder if needed)
          - [ ] Content and metadata are accurate
          EOF
          )"
