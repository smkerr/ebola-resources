name: Deploy PR preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      base_url: /ebola-resources/preview/pr-${{ github.event.pull_request.number }}

  deploy-preview:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: _site

      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Deploy preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          cd gh-pages
          rm -rf "preview/pr-${PR_NUMBER}"
          mkdir -p "preview/pr-${PR_NUMBER}"
          cp -r ../_site/* "preview/pr-${PR_NUMBER}/"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy preview for PR #${PR_NUMBER}"
          git push

      - name: Comment preview link on PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const prNumber = process.env.PR_NUMBER;
            const previewUrl = `https://who-collaboratory.github.io/ebola-resources/preview/pr-${prNumber}/`;
            const body = `**Preview deployed!**\n\n${previewUrl}\n\n_This preview will be removed when the PR is closed._`;
            const marker = '<!-- preview-comment -->';
            const markedBody = `${marker}\n${body}`;

            // Find existing preview comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber),
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: markedBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(prNumber),
                body: markedBody,
              });
            }
