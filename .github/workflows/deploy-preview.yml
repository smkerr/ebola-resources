name: Deploy preview

on:
  push:
    branches: [feature/section-index-pages]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}preview/
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jupyter-book

      # Build main site from main branch
      - name: Build main site
        env:
          BASE_URL: /ebola-resources
        run: jupyter-book build --html

      # Switch to feature branch and build preview
      - uses: actions/checkout@v5
        with:
          ref: feature/section-index-pages
          clean: false

      - name: Build preview site
        env:
          BASE_URL: /ebola-resources/preview
        run: |
          mv _build/html _build/main-html
          jupyter-book build --html
          mv _build/html _build/preview
          mv _build/main-html _build/html
          cp -r _build/preview _build/html/preview

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
