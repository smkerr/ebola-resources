name: Suggest a Resource
description: Suggest a resource to add to the Ebola Resources collection.
title: "PR to add new resource"
labels: ["new-resource"]
body:
  - type: input
    id: title
    attributes:
      label: Title of the Ebola resource
      placeholder: "e.g. INRB UMIE Dashboard — DRC Ebola Bundibugyo 2026"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      placeholder: "https://..."
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Resource type
      options:
        - Dashboard
        - Report
        - Tool
        - Dataset
        - Package
    validations:
      required: true

  - type: dropdown
    id: section
    attributes:
      label: Suggested section
      description: Which section does this resource belong in? Pick "Other" if none fit.
      options:
        - Resources and tools
        - Data
        - Emerging evidence
        - Analytical questions
        - Community meeting materials
        - Other / New section
    validations:
      required: true

  - type: input
    id: authors
    attributes:
      label: Authors
      placeholder: "e.g. Ruth McCabe, Sam Abbott"
    validations:
      required: true

  - type: input
    id: organisation
    attributes:
      label: Organisation
      placeholder: "e.g. Imperial College London"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date
      description: Publication or release date of the resource.
      placeholder: "YYYY-MM-DD"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A brief description of what the resource provides. Please do not attach files — only text is used.
      placeholder: "Short description..."
    validations:
      required: true
